<style>
.gallery {
  text-align: center;
  padding: 50px 20px;
}

.coming-soon {
  background-color: #f4f4f4;
  padding: 30px;
  border-radius: 10px;
}
</style>

<!-- ================= MAIN ================= --
<main>

  <!-- PAGE INTRO --
    <section class="section">
      <div class="container">
        <div class="section-header">
          <div class="section-kicker">Gallery</div>
          <h1 class="section-title">Moments from the field</h1>
          <p class="section-text">
            A visual reflection of our programmes, partnerships,
            project implementation and community impact.
          </p>
        </div>
      </div>
    </section>

    <!-- GALLERY GRID --
    <section class="section bg-light">
      <div class="container">

        <div class="gallery-grid">

          <!-- IMAGE 1 --
          <figure class="gallery-item">
            <img src="images/gallery/img1.jpg" alt="Youth Bootcamp Session" onclick="openLightbox(this)">
            <figcaption>Youth Bootcamp Leadership Session</figcaption>
          </figure>

          <!-- IMAGE 2 --
          <figure class="gallery-item">
            <img src="images/gallery/img2.jpg" alt="Women in STEM Workshop" onclick="openLightbox(this)">

          </figure>

          <!-- IMAGE 3 --
          <figure class="gallery-item">
            <img src="images/gallery/img3.jpg" alt="Agribusiness Training" onclick="openLightbox(this)">
            <figcaption>Agribusiness Capacity Building Training</figcaption>
          </figure>

          <!-- IMAGE 4 --
          <figure class="gallery-item">
            <img src="images/gallery/img4.jpg" alt="Health Campaign" onclick="openLightbox(this)">
            <figcaption>NHIS & Community Health Outreach</figcaption>
          </figure>

          <!-- IMAGE 5 --

<script src="main.js"></script>
<script>
    function openLightbox(img) {
      document.getElementById("lightbox-img").src = img.src;
      document.getElementById("lightbox").style.display = "flex";
    }

    function closeLightbox() {
      document.getElementById("lightbox").style.display = "none";
    }
  </script>
